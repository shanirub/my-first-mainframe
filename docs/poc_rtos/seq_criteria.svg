<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">

<!-- A1 -->
<rect x="40"  y="30" width="180" height="36" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="130" y="48" text-anchor="middle" dominant-baseline="central" fill="#3C3489">A1 — mode switching</text>
<rect x="40"  y="74" width="180" height="76" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" x="130" y="96"  text-anchor="middle" fill="#5F5E5A">No BusError::BUS_FAULT</text>
<text font-family="sans-serif" font-size="12" x="130" y="114" text-anchor="middle" fill="#5F5E5A">on any send() call.</text>
<text font-family="sans-serif" font-size="12" x="130" y="132" text-anchor="middle" fill="#5F5E5A">ACKs arrive on MCU #1.</text>
<rect x="40"  y="158" width="180" height="28" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" x="130" y="172" text-anchor="middle" dominant-baseline="central" fill="#085041">verified via: serial monitor</text>

<!-- A2 -->
<rect x="250" y="30" width="180" height="36" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="48" text-anchor="middle" dominant-baseline="central" fill="#3C3489">A2 — queue integrity</text>
<rect x="250" y="74" width="180" height="76" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" x="340" y="96"  text-anchor="middle" fill="#5F5E5A">Every HEARTBEAT sent</text>
<text font-family="sans-serif" font-size="12" x="340" y="114" text-anchor="middle" fill="#5F5E5A">by MCU #1 appears as</text>
<text font-family="sans-serif" font-size="12" x="340" y="132" text-anchor="middle" fill="#5F5E5A">received on MCU #2.</text>
<rect x="250" y="158" width="180" height="28" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" x="340" y="172" text-anchor="middle" dominant-baseline="central" fill="#085041">verified via: serial monitor</text>

<!-- A3 -->
<rect x="460" y="30" width="180" height="36" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="550" y="48" text-anchor="middle" dominant-baseline="central" fill="#3C3489">A3 — mutex protection</text>
<rect x="460" y="74" width="180" height="76" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" x="550" y="96"  text-anchor="middle" fill="#5F5E5A">Sender A and Sender B</text>
<text font-family="sans-serif" font-size="12" x="550" y="114" text-anchor="middle" fill="#5F5E5A">never produce garbled</text>
<text font-family="sans-serif" font-size="12" x="550" y="132" text-anchor="middle" fill="#5F5E5A">JSON on MCU #2.</text>
<rect x="460" y="158" width="180" height="28" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" x="550" y="172" text-anchor="middle" dominant-baseline="central" fill="#085041">verified via: serial + PulseView</text>

<!-- All pass banner -->
<rect x="40" y="202" width="600" height="36" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="340" y="220" text-anchor="middle" dominant-baseline="central" fill="#085041">all three pass → proceed to SharedBus v2 + full 5-MCU architecture</text>

</svg>
