<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 280"><rect width="180" height="36" x="40" y="30" fill="#EEEDFE" stroke="#534AB7" stroke-width=".5" rx="8"/><text x="130" y="48" fill="#3C3489" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" text-anchor="middle">A1 — mode switching</text><rect width="180" height="76" x="40" y="74" fill="#F1EFE8" stroke="#B4B2A9" stroke-width=".5" rx="6"/><text x="130" y="96" fill="#5F5E5A" font-family="sans-serif" font-size="12" text-anchor="middle">No BusError::BUS_FAULT</text><text x="130" y="114" fill="#5F5E5A" font-family="sans-serif" font-size="12" text-anchor="middle">on any send() call.</text><text x="130" y="132" fill="#5F5E5A" font-family="sans-serif" font-size="12" text-anchor="middle">ACKs arrive on MCU #1.</text><rect width="180" height="28" x="40" y="158" fill="#E1F5EE" stroke="#0F6E56" stroke-width=".5" rx="6"/><text x="130" y="172" fill="#085041" dominant-baseline="central" font-family="sans-serif" font-size="12" text-anchor="middle">verified via: serial monitor</text><rect width="180" height="36" x="250" y="30" fill="#EEEDFE" stroke="#534AB7" stroke-width=".5" rx="8"/><text x="340" y="48" fill="#3C3489" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" text-anchor="middle">A2 — queue integrity</text><rect width="180" height="76" x="250" y="74" fill="#F1EFE8" stroke="#B4B2A9" stroke-width=".5" rx="6"/><text x="340" y="96" fill="#5F5E5A" font-family="sans-serif" font-size="12" text-anchor="middle">Every HEARTBEAT sent</text><text x="340" y="114" fill="#5F5E5A" font-family="sans-serif" font-size="12" text-anchor="middle">by MCU #1 appears as</text><text x="340" y="132" fill="#5F5E5A" font-family="sans-serif" font-size="12" text-anchor="middle">received on MCU #2.</text><rect width="180" height="28" x="250" y="158" fill="#E1F5EE" stroke="#0F6E56" stroke-width=".5" rx="6"/><text x="340" y="172" fill="#085041" dominant-baseline="central" font-family="sans-serif" font-size="12" text-anchor="middle">verified via: serial monitor</text><rect width="180" height="36" x="460" y="30" fill="#EEEDFE" stroke="#534AB7" stroke-width=".5" rx="8"/><text x="550" y="48" fill="#3C3489" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" text-anchor="middle">A3 — mutex protection</text><rect width="180" height="76" x="460" y="74" fill="#F1EFE8" stroke="#B4B2A9" stroke-width=".5" rx="6"/><text x="550" y="96" fill="#5F5E5A" font-family="sans-serif" font-size="12" text-anchor="middle">Sender A and Sender B</text><text x="550" y="114" fill="#5F5E5A" font-family="sans-serif" font-size="12" text-anchor="middle">never produce garbled</text><text x="550" y="132" fill="#5F5E5A" font-family="sans-serif" font-size="12" text-anchor="middle">JSON on MCU #2.</text><rect width="180" height="28" x="460" y="158" fill="#E1F5EE" stroke="#0F6E56" stroke-width=".5" rx="6"/><text x="550" y="172" fill="#085041" dominant-baseline="central" font-family="sans-serif" font-size="12" text-anchor="middle">verified via: serial + PulseView</text><rect width="600" height="36" x="40" y="202" fill="#E1F5EE" stroke="#0F6E56" stroke-width=".5" rx="8"/><text x="340" y="220" fill="#085041" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" text-anchor="middle">all three pass → proceed to SharedBus v2 + full 5-MCU architecture</text></svg>